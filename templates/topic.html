<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="{{root}}css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <style>
        .main-content { margin-top: 80px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">ML Resources Hub</div>
        <div class="nav-links">
            <a href="{{root}}index.html">Home</a>
            <a href="{{root}}theory.html" class="{{theory_active}}">Theory</a>
            <a href="{{root}}practice.html" class="{{practice_active}}">Practice</a>
            <a href="{{root}}resources.html" class="{{resources_active}}">Resources</a>
        </div>
        <div class="nav-toggle">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <main class="main-content">
        <div class="topic-layout">

            <div class="topic-main">
                <header class="page-header">
                    <a href="{{eyebrow_href}}" class="eyebrow">{{eyebrow_text}}</a>
                    <h1>{{heading}}</h1>
                    <p class="lead">{{lead}}</p>
                </header>

                <div class="level-tabs" role="tablist" aria-label="Difficulty">
                    <button class="level-tab" data-level="basic" type="button">Basic</button>
                    <button class="level-tab active" data-level="standard" type="button">Standard</button>
                    <button class="level-tab" data-level="advanced" type="button">In-depth</button>
                </div>

                {{content}}

                <nav class="topic-nav">
                    {{prev_link}}
                    {{next_link}}
                </nav>
            </div>

            <aside class="topic-sidebar">
                {{sidebar}}
            </aside>

        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2024 ML Resources Hub. All rights reserved.</p>
            <div class="social-links">
                <a href="https://github.com" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="https://linkedin.com" target="_blank"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
            onload="renderMathInElement(document.body, {
                delimiters: [
                    { left: '$$', right: '$$', display: true },
                    { left: '$',  right: '$',  display: false },
                    { left: '\\[', right: '\\]', display: true },
                    { left: '\\(', right: '\\)', display: false }
                ],
                throwOnError: false
            });"></script>
    <script src="{{root}}js/topic-page.js"></script>
</body>
</html>
