<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="200" height="200" fill="#f8f9fa"/>
    
    <!-- Margin lines -->
    <line x1="20" y1="100" x2="180" y2="100" stroke="#6c757d" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="20" y1="80" x2="180" y2="80" stroke="#6c757d" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="20" y1="120" x2="180" y2="120" stroke="#6c757d" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Decision boundary -->
    <line x1="20" y1="100" x2="180" y2="100" stroke="#0d6efd" stroke-width="3"/>
    
    <!-- Support vectors -->
    <circle cx="60" cy="80" r="6" fill="#dc3545" stroke="#dc3545" stroke-width="2"/>
    <circle cx="140" cy="120" r="6" fill="#198754" stroke="#198754" stroke-width="2"/>
    
    <!-- Data points -->
    <circle cx="40" cy="70" r="4" fill="#dc3545"/>
    <circle cx="50" cy="75" r="4" fill="#dc3545"/>
    <circle cx="45" cy="85" r="4" fill="#dc3545"/>
    <circle cx="150" cy="125" r="4" fill="#198754"/>
    <circle cx="160" cy="130" r="4" fill="#198754"/>
    <circle cx="155" cy="140" r="4" fill="#198754"/>
    
    <!-- Margin labels -->
    <text x="10" y="80" fill="#6c757d" font-size="12">+1</text>
    <text x="10" y="120" fill="#6c757d" font-size="12">-1</text>
</svg> 